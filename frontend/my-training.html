<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My training - PowerZone</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="my-training.css">
</head>
<body>
    <div class="page-shell">
        <!-- Gorne menu nawigacyjne aplikacji. -->
        <header class="topbar">
            <nav class="menu">
                <a href="home.html" class="menu-link">Main</a>
                <a href="all-training.html" class="menu-link">All training</a>
                <a href="my-training.html" class="menu-link active">My training</a>
                <a href="timer.html" class="menu-link">Timer</a>
                <a href="profile.html" class="menu-link profile-link">
                    <span>Profile</span>
                    <svg class="profile-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="8" r="5" fill="currentColor"></circle>
                        <path d="M4 22c.7-4.4 4.2-7 8-7s7.3 2.6 8 7" fill="currentColor"></path>
                    </svg>
                </a>
            </nav>
        </header>

        <!-- Glowna zawartosc strony. -->
        <main class="training-content">
            <!-- Naglowek strony z kontrolkami miesiąca. -->
            <div class="calendar-header">
                <h1 class="page-title">My training</h1>
                <div class="view-controls">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                </div>
                <div class="month-controls">
                    <button class="month-nav-btn prev-btn">◀</button>
                    <span class="current-month" id="currentMonth">April 2026</span>
                    <button class="month-nav-btn next-btn">▶</button>
                </div>
            </div>

            <!-- Kalendarz z treningami. -->
            <div class="training-calendar">
                <!-- Naglowek dni tygodnia. -->
                <div class="calendar-weekdays">
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                    <div class="weekday">Sun</div>
                </div>

                <!-- Siatka dni miesiąca. -->
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Dni będą wstawiane przez JavaScript -->
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-socials">
                <a href="#" class="social-link" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v2H6v4h3v5h4v-5h3l1-4h-4V9c0-.6.4-1 1-1Z" fill="currentColor"></path>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="YouTube">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21.6 7.2a2.9 2.9 0 0 0-2-2C17.8 4.7 12 4.7 12 4.7s-5.8 0-7.6.5a2.9 2.9 0 0 0-2 2A30.3 30.3 0 0 0 2 12a30.3 30.3 0 0 0 .4 4.8 2.9 2.9 0 0 0 2 2c1.8.5 7.6.5 7.6.5s5.8 0 7.6-.5a2.9 2.9 0 0 0 2-2A30.3 30.3 0 0 0 22 12a30.3 30.3 0 0 0-.4-4.8ZM10 15.5v-7l6 3.5-6 3.5Z" fill="currentColor"></path>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4Zm0 2.5A1.5 1.5 0 0 0 5.5 7v10A1.5 1.5 0 0 0 7 18.5h10a1.5 1.5 0 0 0 1.5-1.5V7A1.5 1.5 0 0 0 17 5.5H7Zm5 2.3A4.2 4.2 0 1 1 7.8 12 4.2 4.2 0 0 1 12 7.8Zm0 2A2.2 2.2 0 1 0 14.2 12 2.2 2.2 0 0 0 12 9.8Zm4.6-3.2a1 1 0 1 1-1 1 1 1 0 0 1 1-1Z" fill="currentColor"></path>
                    </svg>
                </a>
            </div>
            <p class="footer-copy">&copy; 2026 PowerZone Gym</p>
        </footer>
    </div>

    <script src="home.js"></script>
    <script src="my-training.js"></script>
</body>
</html>
