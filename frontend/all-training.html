<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Training</title>
    <link rel="stylesheet" href="all-training.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <nav class="menu">
                <a href="home.html" class="menu-link">Main</a>
                <a href="all-training.html" class="menu-link active">All training</a>
                <a href="#" class="menu-link">My training</a>
                <a href="#" class="menu-link">Timer</a>
                <a href="profile.html" class="menu-link profile-link">
                    <span>Profile</span>
                    <svg class="profile-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="8" r="5" fill="currentColor"></circle>
                        <path d="M4 22c.7-4.4 4.2-7 8-7s7.3 2.6 8 7" fill="currentColor"></path>

        <main class="training-content">
            <section class="training-grid">
                <article class="training-card">
                    <img src="images/bikeroom.png" alt="BikeRoom">
                    <h2>BikeRoom</h2>
                </article>

                <article class="training-card">
                    <img src="images/crossfit.png" alt="CrossFit">
                    <h2>CrossFit</h2>
                </article>

                <article class="training-card">
                    <img src="images/gym.png" alt="Gym">
                    <h2>Gym</h2>
                </article>

                <article class="training-card">
                    <img src="images/dance.png" alt="DanceFit">
                    <h2>DanceFit</h2>
                </article>

                <article class="training-card">
                    <img src="images/yoga.png" alt="Yoga">
                    <h2>Yoga</h2>
                </article>

                <article class="training-card">
                    <img src="images/stretching.png" alt="Stretching">
                    <h2>Stretching</h2>
                </article>
            </section>
        </main>

        <footer class="site-footer">
            <div class="footer-socials">
                <a href="#" class="social-link" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 8h3V4h-3c-2.8 0-5 2.2-5 5v2H6v4h3v5h4v-5h3l1-4h-4V9c0-.6.4-1 1-1Z" fill="currentColor"></path>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="YouTube">

                    </svg>
                </a>
