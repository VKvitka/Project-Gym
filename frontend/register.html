<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerZone Registration</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <main class="page">
        <section class="register-panel">
            <div class="brand-box">
                <p class="welcome">Welcome to</p>
                <h1>PowerZone</h1>
                <p class="brand-subtitle">GYM</p>
            </div>

            <form class="form-box" id="registerForm">
                <div class="input-group">
                    <input type="text" id="firstName" placeholder="Name" required>
                </div>

                <div class="input-group">
                    <input type="text" id="lastName" placeholder="Surname" required>
                </div>

                <div class="input-group">
                    <input type="email" id="registerEmail" placeholder="Email" required>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <button type="button" class="toggle-password" id="toggleRegisterPassword" aria-label="Show password">
                        <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2.5 12S6.5 5.5 12 5.5c2 0 3.8.5 5.3 1.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M21.5 12S17.5 18.5 12 18.5c-2 0-3.8-.5-5.3-1.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 4l16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="repeatPassword" placeholder="Repeat password" required>
                    <button type="button" class="toggle-password" id="toggleRepeatPassword" aria-label="Show password">
                        <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2.5 12S6.5 5.5 12 5.5c2 0 3.8.5 5.3 1.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M21.5 12S17.5 18.5 12 18.5c-2 0-3.8-.5-5.3-1.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 4l16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <button class="signup-btn" type="submit">Sing Up</button>

                <a class="back-link" href="login.html" aria-label="Back to login">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14.5 5 7.5 12l7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8.5 12H20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </a>
            </form>
        </section>
    </main>

    <script src="register.js"></script>
</body>
</html>
